name: 'Terraform Deploy'

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: 'read'
  'id-token': 'write'

jobs:
  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_wrapper: false

    - name: Configure GCP Credentials
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Setup gcloud CLI
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Terraform Init
      id: init
      working-directory: ./infra
      run: |
        terraform init \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -input=false

    - name: Download Terraform Plan (if available)
      uses: actions/download-artifact@v3
      with:
        name: tfplan
        path: infra/

    - name: Terraform Apply
      id: apply
      working-directory: ./infra
      run: |
        if [ -f "tfplan" ]; then
          terraform apply -auto-approve tfplan
        else
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ secrets.GCP_REGION || 'us-central1' }}" \
            -var="zone=${{ secrets.GCP_ZONE || 'us-central1-a' }}"
        fi

    - name: Get VM IP
      id: get-ip
      working-directory: ./infra
      run: |
        IP=$(terraform output -raw vm_external_ip)
        echo "VM_IP=$IP" >> $GITHUB_ENV
        echo "API_ENDPOINT=https://$IP" >> $GITHUB_ENV

    - name: Update Deployment Status
      uses: bobheadxi/deployments@v1
      with:
        step: finish
        status: ${{ job.status }}
        env: production
        token: ${{ secrets.GITHUB_TOKEN }}
      if: always()
