name: 'Terraform Deploy'

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: 'read'
  'id-token': 'write'

jobs:
  terraform-deploy:
    name: 'Terraform Deploy'
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_wrapper: false
        terraform_version: 1.7.5

    - name: Configure GCP Credentials
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Setup gcloud CLI
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        export_default_credentials: true

    - name: Set Terraform State Bucket
      run: echo "TF_STATE_BUCKET=tf-state-cb-cid" >> $GITHUB_ENV

    - name: Clean up Terraform
      working-directory: ./infra
      run: |
        rm -rf .terraform
        rm -f .terraform.lock.hcl
        rm -f terraform.tfstate*

    - name: Initialize Terraform
      id: init
      working-directory: ./infra
      run: |
        terraform init \
          -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
          -backend-config="prefix=terraform/state" \
          -input=false \
          -upgrade

    - name: Terraform Format
      id: fmt
      working-directory: ./infra
      run: terraform fmt -check

    - name: Terraform Validate
      id: validate
      working-directory: ./infra
      run: terraform validate -no-color

    - name: Terraform Plan
      id: plan
      working-directory: ./infra
      run: |
        terraform plan \
          -input=false \
          -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
          -var="region=${{ secrets.GCP_REGION || 'us-central1' }}" \
          -var="zone=${{ secrets.GCP_ZONE || 'us-central1-a' }}" \
          -out=tfplan

    - name: Terraform Apply
      id: apply
      working-directory: ./infra
      run: terraform apply -auto-approve tfplan

    - name: Get VM IP
      id: get-ip
      working-directory: ./infra
      run: |
        IP=$(terraform output -raw vm_external_ip)
        echo "VM_IP=$IP" >> $GITHUB_ENV
        echo "API_ENDPOINT=https://$IP" >> $GITHUB_ENV